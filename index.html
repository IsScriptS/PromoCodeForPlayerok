<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playerok promo I4S bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #1a0a2e, #2d1b4e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.03) 0%, transparent 50%);
            animation: floatBG 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes floatBG {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(2%, -2%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 40px 35px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            animation: pulseIcon 3s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05) rotate(-3deg); }
        }

        .logo h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 0 40px rgba(255, 107, 53, 0.2);
        }

        .logo h1 .highlight {
            background: linear-gradient(135deg, #ff6b35, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .subtitle {
            color: #6a6a8a;
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .logo .badge {
            display: inline-block;
            background: rgba(255, 107, 53, 0.15);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 10px;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #b0b0d0;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.05);
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.06);
        }

        .form-group input::placeholder {
            color: #4a4a6a;
        }

        .form-group input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b35, #e04400);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 6px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 107, 53, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .btn-rofl {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            margin-top: 8px;
        }

        .btn-rofl:hover {
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .message {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 14px;
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            display: block;
            background: rgba(46, 213, 115, 0.12);
            border: 1px solid rgba(46, 213, 115, 0.2);
            color: #2ed573;
        }

        .message.error {
            display: block;
            background: rgba(255, 71, 87, 0.12);
            border: 1px solid rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .message.info {
            display: block;
            background: rgba(54, 164, 235, 0.12);
            border: 1px solid rgba(54, 164, 235, 0.2);
            color: #36a4eb;
        }

        .message.warning {
            display: block;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .message.rofl {
            display: block;
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            color: #ffd700;
            animation: roflGlow 1.5s ease-in-out infinite;
        }

        @keyframes roflGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); }
        }

        .hidden {
            display: none !important;
        }

        .stats {
            margin-top: 20px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            color: #4a4a6a;
            font-size: 12px;
        }

        .stats span {
            color: #8a8aaa;
        }

        .stats .stat-value {
            color: #b0b0d0;
            font-weight: 600;
        }

        .stats .stat-value.rofl-count {
            color: #ffd700;
        }

        .switch-link {
            color: #5a5a7a;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.3s;
            padding: 8px;
            border-radius: 10px;
        }

        .switch-link:hover {
            color: #ff6b35;
            background: rgba(255, 107, 53, 0.05);
        }

        .robux-amount {
            color: #ffd700;
            font-weight: 700;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #3a3a5a;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .footer span {
            color: #ff6b35;
        }

        .footer .rofl-emoji {
            color: #ffd700;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
                border-radius: 24px;
            }

            .logo h1 {
                font-size: 22px;
            }

            .logo-icon {
                font-size: 38px;
            }

            .form-group input {
                padding: 12px 16px;
                font-size: 15px;
            }

            .btn {
                padding: 14px;
                font-size: 16px;
            }

            .stats {
                flex-direction: column;
                gap: 4px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- ========== РЕГИСТРАЦИЯ ========== -->
        <div id="registerPage">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1><span class="highlight">Playerok</span> promo<br>I4S bot</h1>
                <div class="subtitle">Активируй промокоды</div>
                <div class="badge">⚡ Работает 24/7</div>
            </div>

            <div class="form-group">
                <label>👤 Ник в Roblox</label>
                <input type="text" id="robloxUsername" placeholder="@YourNickname" maxlength="30" autocomplete="off" />
            </div>

            <button class="btn" id="registerBtn">🚀 Начать активацию</button>

            <div id="registerMessage" class="message"></div>

            <div class="footer">
                <span>●</span> I4S bot <span>●</span> 2026 <span class="rofl-emoji">😂</span>
            </div>
        </div>

        <!-- ========== ОСНОВНАЯ СТРАНИЦА ========== -->
        <div id="mainPage" class="hidden">
            <div class="logo">
                <span class="logo-icon">🎯</span>
                <h1><span class="highlight">Playerok</span> promo</h1>
                <div class="subtitle">Введи промокод</div>
                <div class="badge" style="background: rgba(46, 213, 115, 0.1); border-color: rgba(46, 213, 115, 0.2); color: #2ed573;">
                    👋 Привет, <span id="displayUsername" style="color: #ffd700;">@user</span>
                </div>
            </div>

            <div class="form-group">
                <label>🔑 Промокод</label>
                <input type="text" id="promoInput" placeholder="Введи код..." autocomplete="off" />
            </div>

            <button class="btn" id="checkPromoBtn">✅ Проверить</button>
            <button class="btn btn-rofl" id="roflButton">😂 ROFL-код одним кликом!</button>

            <div id="promoMessage" class="message"></div>

            <button class="btn btn-secondary" id="logoutBtn">🚪 Сменить ник</button>

            <div class="stats">
                <span>💎 Доступно: <span class="stat-value" id="promoCount">6</span></span>
                <span>📊 Проверок: <span class="stat-value" id="totalChecks">0</span></span>
                <span>🏆 Использовано: <span class="stat-value" id="usedCount">0</span></span>
                <span>😂 ROFL: <span class="stat-value rofl-count" id="roflCount">0</span></span>
            </div>

            <div class="footer">
                <span>●</span> I4S bot v2.0 <span>●</span> <span class="rofl-emoji">🤣</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ДАННЫЕ: ПРОМОКОДЫ (включая ROFL)
        // ============================================
        const VALID_CODES = [
            { code: "Sa83nvjv94rb4jc8xhd", robux: 200 },
            { code: "Syrbqn_vurb4m12417vn", robux: 100 },
            { code: "Ajgnrteo4j3n2h5bcjth5bfk", robux: 300 },
            { code: "SyrbSGFGHru48ghv", robux: 400 },
            { code: "Shtbvl[';gbjguthgbf(@*478", robux: 500 },
            // 🎉 ROFL-КОД
            { code: "ROFLTEST127S4h8fn", robux: 10, isRofl: true }
        ];

        // ============================================
        // СОСТОЯНИЕ
        // ============================================
        let currentUser = null;
        let totalChecks = 0;
        let usedCodes = [];
        let roflUsedCount = 0;

        // ============================================
        // DOM-ЭЛЕМЕНТЫ
        // ============================================
        const registerPage = document.getElementById('registerPage');
        const mainPage = document.getElementById('mainPage');
        const robloxInput = document.getElementById('robloxUsername');
        const registerBtn = document.getElementById('registerBtn');
        const registerMessage = document.getElementById('registerMessage');

        const displayUsername = document.getElementById('displayUsername');
        const promoInput = document.getElementById('promoInput');
        const checkPromoBtn = document.getElementById('checkPromoBtn');
        const promoMessage = document.getElementById('promoMessage');
        const logoutBtn = document.getElementById('logoutBtn');
        const promoCountSpan = document.getElementById('promoCount');
        const totalChecksSpan = document.getElementById('totalChecks');
        const usedCountSpan = document.getElementById('usedCount');
        const roflCountSpan = document.getElementById('roflCount');
        const roflButton = document.getElementById('roflButton');

        // ============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================

        function showMessage(element, text, type = 'info') {
            element.textContent = text;
            element.className = `message ${type}`;
            element.style.display = 'block';
        }

        function hideMessage(element) {
            element.style.display = 'none';
            element.className = 'message';
        }

        function isValidUsername(name) {
            return /^@[a-zA-Z0-9_]{3,29}$/.test(name);
        }

        function sendEmail(username, robuxAmount, isRofl = false) {
            const emoji = isRofl ? '😂 ROFL' : '💰';
            console.log(`📧 ПИСЬМО ОТПРАВЛЕНО (Playerok I4S bot):
            ──────────────────────────
            Кому: (ваша почта)
            Тема: Активация промокода I4S ${isRofl ? '🎉 ROFL' : ''}
            ──────────────────────────
            Пользователь: ${username}
            ${emoji} Получено Robux: ${robuxAmount}
            ${isRofl ? '🎭 ТИП: ROFL-ПРОМОКОД!' : ''}
            Дата: ${new Date().toLocaleString()}
            ──────────────────────────`);
        }

        function updateStats() {
            const available = VALID_CODES.length - usedCodes.length;
            promoCountSpan.textContent = available;
            totalChecksSpan.textContent = totalChecks;
            usedCountSpan.textContent = usedCodes.length;
            roflCountSpan.textContent = roflUsedCount;

            if (available === 0) {
                promoCountSpan.style.color = '#ff4757';
            } else {
                promoCountSpan.style.color = '#b0b0d0';
            }
        }

        // Основная логика проверки промокода
        function processPromoCode(promo, isRoflAuto = false) {
            if (!currentUser) {
                showMessage(promoMessage, '⚠️ Сначала зарегистрируйтесь!', 'error');
                return false;
            }

            if (!promo) {
                showMessage(promoMessage, '⚠️ Введите промокод', 'error');
                return false;
            }

            // Проверяем, не использовал ли этот пользователь уже этот код
            if (currentUser.usedCodes.includes(promo)) {
                showMessage(promoMessage, '❌ Вы уже активировали этот промокод!', 'error');
                return false;
            }

            // Ищем код
            const found = VALID_CODES.find(item => item.code === promo);

            if (found) {
                // Проверяем, не использован ли код глобально
                if (usedCodes.includes(promo)) {
                    showMessage(promoMessage, '❌ Этот промокод уже использован другим пользователем!', 'error');
                    return false;
                }

                // ✅ Успех
                const robuxAmount = found.robux;
                const isRofl = found.isRofl || false;

                usedCodes.push(promo);
                currentUser.usedCodes.push(promo);
                totalChecks++;

                if (isRofl) {
                    roflUsedCount++;
                }

                // Отправляем письмо
                sendEmail(currentUser.username, robuxAmount, isRofl);

                // Показываем сообщение
                if (isRofl) {
                    showMessage(promoMessage,
                        `😂 ROFL-КОД АКТИВИРОВАН! ${robuxAmount} Robux поступят на баланс в течение 10-60 минут. ХА-ХА! 🤣`,
                        'rofl'
                    );
                } else {
                    showMessage(promoMessage,
                        `🎉 Промокод активирован! ${robuxAmount} Robux поступят на баланс в течение 10-60 минут.`,
                        'success'
                    );
                }

                updateStats();
                if (!isRoflAuto) {
                    promoInput.value = '';
                }

                // Автоматически скрыть сообщение через 10 секунд
                setTimeout(() => {
                    if (promoMessage.className.includes('success') || promoMessage.className.includes('rofl')) {
                        hideMessage(promoMessage);
                    }
                }, 10000);

                return true;

            } else {
                // ❌ Неверный код
                totalChecks++;
                showMessage(promoMessage, '❌ Неверный промокод! Попробуйте снова.', 'error');
                updateStats();
                if (!isRoflAuto) {
                    promoInput.value = '';
                }
                return false;
            }
        }

        // ============================================
        // РЕГИСТРАЦИЯ
        // ============================================
        registerBtn.addEventListener('click', function() {
            const username = robloxInput.value.trim();

            if (!username) {
                showMessage(registerMessage, '⚠️ Введите ник в Roblox', 'error');
                return;
            }

            if (!isValidUsername(username)) {
                showMessage(registerMessage, '❌ Ник должен начинаться с @ (3-29 символов: буквы, цифры, _)', 'error');
                return;
            }

            currentUser = {
                username: username,
                usedCodes: []
            };

            registerPage.classList.add('hidden');
            mainPage.classList.remove('hidden');
            displayUsername.textContent = username;
            hideMessage(registerMessage);
            robloxInput.value = '';

            updateStats();
            showMessage(promoMessage, `👋 Добро пожаловать, ${username}! Введи промокод или жми ROFL-кнопку!`, 'info');
        });

        // ============================================
        // ПРОВЕРКА ПРОМОКОДА (обычная)
        // ============================================
        checkPromoBtn.addEventListener('click', function() {
            const promo = promoInput.value.trim();
            processPromoCode(promo, false);
        });

        // ============================================
        // ROFL-КНОПКА (автоматическая вставка ROFL-кода)
        // ============================================
        roflButton.addEventListener('click', function() {
            const roflCode = "ROFLTEST127S4h8fn";
            
            // Проверяем, не использован ли ROFL-код уже
            if (usedCodes.includes(roflCode)) {
                showMessage(promoMessage, '😂 ROFL-код уже кто-то использовал! Смешно, но больше не работает! 🤣', 'warning');
                return;
            }

            if (currentUser && currentUser.usedCodes.includes(roflCode)) {
                showMessage(promoMessage, '😂 Ты уже активировал ROFL-код! Хватит смеяться! 🤣', 'warning');
                return;
            }

            // Автоматически вставляем и активируем ROFL-код
            promoInput.value = roflCode;
            processPromoCode(roflCode, true);
            promoInput.value = '';
        });

        // ============================================
        // ВЫХОД
        // ============================================
        logoutBtn.addEventListener('click', function() {
            currentUser = null;
            registerPage.classList.remove('hidden');
            mainPage.classList.add('hidden');
            hideMessage(registerMessage);
            hideMessage(promoMessage);
            promoInput.value = '';
            robloxInput.value = '';
            showMessage(registerMessage, '👋 Вы вышли. Введите новый ник.', 'info');
        });

        // ============================================
        // ENTER
        // ============================================
        robloxInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') registerBtn.click();
        });

        promoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPromoBtn.click();
        });

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        updateStats();
        console.log('🤖 Playerok promo I4S bot загружен!');
        console.log('📋 Промокодов:', VALID_CODES.length);
        console.log('😂 ROFL-код: ROFLTEST127S4h8fn (10 Robux)');
    </script>

</body>
</html>
